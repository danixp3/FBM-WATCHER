# Programación: cada 4 h (UTC). Manual: Actions → Marketplace monitor → Run workflow.
#
# Secretos (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID  (obligatorios)
#   PLAYWRIGHT_STORAGE_B64                (opcional, base64 de playwright_storage.json)
#
# Tras cada ejecución, si cambia estado_motos.json, se hace commit y push a esta rama.
# La sesión de Facebook sigue en la caché de Actions (o en PLAYWRIGHT_STORAGE_B64).

name: Marketplace monitor

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

concurrency:
  group: marketplace-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MW_CONCURRENCY: "2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias y Chromium
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restaurar sesión Facebook (solo playwright_storage.json)
        uses: actions/cache@v4
        id: cache-monitor
        with:
          path: playwright_storage.json
          key: fb-monitor-session-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            fb-monitor-session-

      - name: Sobrescribir sesión con el secreto (si está definido)
        env:
          PLAYWRIGHT_STORAGE_B64: ${{ secrets.PLAYWRIGHT_STORAGE_B64 }}
        run: |
          if [ -n "$PLAYWRIGHT_STORAGE_B64" ]; then
            echo "$PLAYWRIGHT_STORAGE_B64" | base64 -d > playwright_storage.json
          fi

      - name: Comprobar archivos
        run: |
          test -f urls_motos.txt || (echo "Falta urls_motos.txt" && exit 1)
          test -f monitor_motos.py || (echo "Falta monitor_motos.py" && exit 1)

      - name: Ejecutar monitor
        run: python monitor_motos.py

      - name: Commit y push de estado_motos.json si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add estado_motos.json
          if git diff --staged --quiet; then
            echo "estado_motos.json sin cambios; no hay commit."
          else
            git commit -m "chore: actualizar estado_motos.json (Marketplace monitor)"
            git push
          fi
